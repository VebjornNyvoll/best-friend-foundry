name: "Recovery (Cyberbear)"
type: script
scope: global
img: icons/skills/movement/figure-running-gray.webp
command: |-
  const mod = game.modules.get("cpred-best-friend");
  if (!mod?.api?.recovery) {
    ui.notifications.error("Your New Best Friend module is not active.");
    return;
  }
  await mod.api.recovery();
