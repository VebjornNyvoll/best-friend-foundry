name: "Flamebreath (Neon Newt)"
type: script
scope: global
img: icons/magic/fire/beam-jet-stream-yellow.webp
command: |-
  const mod = game.modules.get("cpred-best-friend");
  if (!mod?.api?.flamebreath) {
    ui.notifications.error("Your New Best Friend module is not active.");
    return;
  }
  await mod.api.flamebreath();
