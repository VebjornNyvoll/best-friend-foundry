  information:
    description: "<p><strong>Cyberbear\u2122</strong> &mdash; Cost: 20,000eb (Super Luxury) | Required Lifestyle: Fresh Food x2 | Cyberware Slots: 3 | Level: Mini-Boss</p><p>The Cyberbear does one thing very well: ripping meat to shreds. To make matters worse, some have escaped, and they've already found a niche up north in the free state of Alaska's Yukon Valley. Rumor has it their bioengineering has filled their brains with tumors, making them feral.</p><p><strong>Cyberbear Martial Art:</strong></p><p><strong>Recovery:</strong> Whenever the bear uses the Get Up Action, they can attempt to beat a DV13 with the Martial Arts Special Move Resolution. If they succeed, that Get Up Action didn't cost an Action.</p><p><strong>Three-Arm Strike:</strong> Once per Turn when the bear hits the same target with two Bear Claw attacks, they can attempt DV15. Success: choose one effect (grapple, extra attack, random Body Critical Injury, or reduce armor SP by 4). Failure: suffer 5 damage directly to HP from brain tumor.</p>"
    level: miniBoss
  roleInfo:
    roles: []
    abilities: "Cyberbear Martial Art: Recovery (DV13 free Get Up) and Three-Arm Strike (DV15 after two claw hits, four options on success, 5 self-damage on failure)."
