  information:
    description: "<p><strong>Cyberrat\u2122</strong> &mdash; Cost: 1,000eb (Very Expensive) | Required Lifestyle: Generic Prepak | Cyberware Slots: 2 | Level: Mook</p><p>A bio-enhanced, venomous rat bred to be used in corporate espionage. Freshly equipped with enhanced surveillance cyberware and fitted with skinweave, this Cyberpet makes a great expendable operative or a best friend who can keep an eye on your apartment.</p><p><strong>Venom Fangs/Claws:</strong> When a Cyberrat successfully attacks with its Venom Fangs/Claws (even if it does no damage) the target must beat a DV13 Resist Torture/Drugs Check or be dealt 1d6 additional damage directly to their HP.</p>"
    level: mook
