  information:
    description: "<p><strong>Neon Newt\u2122</strong> &mdash; Cost: 2,000eb (Very Expensive) | Required Lifestyle: Good Prepak | Cyberware Slots: 1 | Level: Hardened Mook</p><p>A genetically modified, pocket-sized bio-flamethrower. When squeezed or otherwise agitated, the newt emits a fiery breath. Its acid-secreting skin comes in an impressive variety of lab-engineered neon pinks, blues, and greens that would never be found in nature.</p><p><strong>Acid Secretion:</strong> Neon Newts can secrete intense acid through their skin. With a successful attack the acid does not damage but lowers the SP of all worn armor by 1.</p><p><strong>Flamebreath:</strong> A Neon Newt can blow an impressive blast of fire. This acts like a Flamethrower (see CP:R page 348) and cannot be used if the Flamebreath was activated during the Newt's last Turn.</p>"
    level: hardenedMook
  roleInfo:
    roles: []
    abilities: "Acid Secretion: On hit, lowers SP of all worn armor by 1. Flamebreath: Acts like a Flamethrower, cannot be used two turns in a row."
