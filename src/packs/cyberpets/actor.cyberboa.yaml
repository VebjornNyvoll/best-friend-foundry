  information:
    description: "<p><strong>Cyberboa\u2122</strong> &mdash; Cost: 4,000eb (Luxury) | Required Lifestyle: Fresh Food | Cyberware Slots: 3 | Level: Hardened Lieutenant</p><p>Designed and marketed as a search and rescue operative, what Biotechnica actually released with the Cyberboa was a serpent combining the DNA of all the world's most dangerous snakes in a single creature. No Cyberpet better exemplifies Nicolo Loggagia's concept of 'better survival through biochemistry' than the Cyberboa.</p><p><strong>Airhypo Vampyres:</strong> When a Cyberboa successfully attacks with its Vampyres (even if it does no damage), its Airhypo Vampyres pump a dose of a loaded substance into the target. A compartment concealed in the Cyberboa's mouth can load up to 5 doses of a single Biotoxin, Poison, or Streetdrug.</p>"
    level: hardenedLieutenant
  roleInfo:
    roles: []
    abilities: "Airhypo Vampyres: On Vampyres hit, injects a dose of loaded substance. Holds 5 doses of a single Biotoxin, Poison, or Street Drug."
