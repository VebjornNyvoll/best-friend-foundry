  information:
    description: "<p><strong>Cyberwolf\u2122</strong> &mdash; Cost: 4,000eb (Luxury) | Required Lifestyle: Good Prepak | Cyberware Slots: 3 | Level: Hardened Lieutenant</p><p>Cyber-enhanced pack hunters created to be the new top of the food chain. Each Custom Security Canine is enhanced with cyberware to improve the efficiency of the pack and state-of-the-art hydraulic jaws engineered for close-quarters bone breaking. Typically found in a pack, though some are sold and trained for solo use as Custom Security Canines. Each comes with a free, custom-fitted Light Armorjack.</p><p><strong>Combat Awareness:</strong> While a Cyberwolf is not technically a Solo, it can use the Combat Awareness Role Ability (see CP:R page 146) at Rank 3 so long as it is within 20 m/yds of another Cyberwolf in its pack.</p>"
    level: hardenedLieutenant
  roleInfo:
    roles: []
    abilities: "Combat Awareness Rank 3: Functions as the Combat Awareness Role Ability at Rank 3, only while within 20 m/yds of another Cyberwolf in its pack."
