  information:
    description: "<p><strong>Obsidian Ocelot\u2122</strong> &mdash; Cost: 4,000eb (Luxury) | Required Lifestyle: Fresh Food | Cyberware Slots: 3 | Level: Hardened Lieutenant</p><p>Beautifully bred for high-end customers, these perfect cyberpreds are both gorgeous ornaments and stealthy killers waiting to be unleashed. Most Obsidian Ocelots are kept out of the public eye and pampered endlessly. A select few are trained to accompany assassins you couldn't afford to hire.</p><p><strong>Combat Awareness:</strong> While an Obsidian Ocelot is not technically a Solo, it can use the Combat Awareness Role Ability (see CP:R page 146) at Rank 5.</p>"
