  information:
    description: "<p><strong>Forever Turtle\u2122</strong> &mdash; Cost: 2,000eb (Very Expensive) | Required Lifestyle: Good Prepak | Cyberware Slots: 2 | Level: Hardened Mook</p><p>One of the original Cyberpets. The Forever Turtle comes equipped with a Trauma Response Nanomatrix to ensure longevity. Twenty years of research and development and DNA spliced from more than six species have turned this once cute Cyberpet into an unsettling testudine amalgamation.</p><p><strong>Protection:</strong> A Forever Turtle can draw its head and limbs into its shell. When it does so, the protection of its Hardened Shell extends to its head and it cannot be targeted by Aimed Shots.</p>"
    level: hardenedMook
  roleInfo:
    roles: []
    abilities: "Protection: Draw into shell to extend Hardened Shell SP to head. Cannot be targeted by Aimed Shots while withdrawn."
